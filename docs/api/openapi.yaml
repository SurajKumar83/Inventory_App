openapi: 3.0.0
info:
  title: DukaanSync Inventory Management API
  description: |
    Multi-location inventory management platform for small retailers.
    Complete REST API for managing products, stock, orders, customers, suppliers, and alerts across multiple shops.
  version: 1.0.0
  contact:
    name: DukaanSync Support
    email: support@dukaansync.local
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.dukaansync.local/api/v1
    description: Production API
  - url: http://localhost:5000/api/v1
    description: Local development API

tags:
  - name: Authentication
    description: User login, registration, and token management
  - name: Products
    description: Product CRUD operations and details
  - name: Inventory
    description: Stock management, transfers, and adjustments
  - name: Orders
    description: Order creation, status tracking, and management
  - name: Customers
    description: Customer profiles and delivery addresses
  - name: Suppliers
    description: Supplier management and products
  - name: Alerts
    description: Low-stock alerts and notifications
  - name: Dashboard
    description: Real-time metrics and analytics
  - name: Events
    description: Real-time event polling for inventory updates

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token in Authorization header (RS256 signed)

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Invalid request parameters"
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
      required:
        - success
        - message

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, STAFF, CUSTOMER]
        phone:
          type: string
        shopId:
          type: string
          format: uuid
          nullable: true
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - name
        - role
        - mfaEnabled

    AuthToken:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (15 min expiry)
        refreshToken:
          type: string
          description: JWT refresh token (7 days expiry)
        user:
          $ref: '#/components/schemas/User'
      required:
        - accessToken
        - refreshToken
        - user

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        sku:
          type: string
          description: Stock Keeping Unit
        category:
          type: string
        price:
          type: number
          format: float
          minimum: 0
        costPrice:
          type: number
          format: float
          minimum: 0
        reorderLevel:
          type: integer
          minimum: 0
          description: Minimum quantity before alert
        supplier:
          $ref: '#/components/schemas/Supplier'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sku
        - category
        - price
        - costPrice
        - reorderLevel

    Stock:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 0
        lastRestocked:
          type: string
          format: date-time
        product:
          $ref: '#/components/schemas/Product'
        shop:
          $ref: '#/components/schemas/Shop'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - shopId
        - quantity

    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        phone:
          type: string
        manager:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - location

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
          pattern: '^ORD-\d{10}$'
          example: ORD-1711353600
        customerId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
          default: PENDING
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: float
        paymentStatus:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        deliveryAddress:
          $ref: '#/components/schemas/DeliveryAddress'
        payment:
          $ref: '#/components/schemas/Payment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - customerId
        - status
        - totalAmount

    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          format: float
        product:
          $ref: '#/components/schemas/Product'
      required:
        - id
        - orderId
        - productId
        - quantity
        - price

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        razorpayOrderId:
          type: string
          description: Razorpay order ID
        razorpayPaymentId:
          type: string
          nullable: true
          description: Razorpay payment ID (null until payment completes)
        razorpaySignature:
          type: string
          nullable: true
        amount:
          type: number
          format: float
        currency:
          type: string
          enum: [INR]
          default: INR
        status:
          type: string
          enum: [PENDING, COMPLETED, FAILED]
        method:
          type: string
          enum: [CARD, NETBANKING, WALLET, UPI]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - orderId
        - razorpayOrderId
        - amount
        - status

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone:
          type: string
        name:
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryAddress'
        totalOrders:
          type: integer
          minimum: 0
        totalSpent:
          type: number
          format: float
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - phone
        - name

    DeliveryAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        name:
          type: string
          description: Address label (e.g., Home, Work)
        street:
          type: string
        city:
          type: string
        state:
          type: string
        zipcode:
          type: string
        phone:
          type: string
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - customerId
        - name
        - street
        - city
        - state
        - zipcode

    Supplier:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        whatsapp:
          type: string
          nullable: true
        contactPerson:
          type: string
        paymentTerms:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BLOCKED]
          default: ACTIVE
        products:
          type: array
          items:
            $ref: '#/components/schemas/SupplierProduct'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - phone
        - contactPerson

    SupplierProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        supplierId:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        supplierSku:
          type: string
        supplierPrice:
          type: number
          format: float
        leadTimeInDays:
          type: integer
          minimum: 1
        isActive:
          type: boolean
        minOrderQuantity:
          type: integer
          minimum: 1
        lastQuotedAt:
          type: string
          format: date-time
      required:
        - id
        - supplierId
        - productId
        - supplierPrice
        - leadTimeInDays

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        alertType:
          type: string
          enum: [LOW_STOCK, OUT_OF_STOCK, OVERSTOCK]
        quantity:
          type: integer
          description: Current quantity when alert triggered
        reorderLevel:
          type: integer
        status:
          type: string
          enum: [ACTIVE, RESOLVED]
          default: ACTIVE
        sentAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        notificationMethods:
          type: array
          items:
            type: string
            enum: [EMAIL, WHATSAPP, SMS]
        product:
          $ref: '#/components/schemas/Product'
        shop:
          $ref: '#/components/schemas/Shop'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - productId
        - shopId
        - alertType
        - quantity
        - reorderLevel

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, STOCK_ADJUSTED, STOCK_TRANSFERRED]
        entityType:
          type: string
          enum: [PRODUCT, STOCK, ORDER, SUPPLIER, CUSTOMER, ALERT]
        entityId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        changes:
          type: object
          additionalProperties: true
          description: Previous and new values
          example:
            quantity:
              before: 100
              after: 95
        reason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - action
        - entityType
        - entityId
        - userId

    DashboardStats:
      type: object
      properties:
        totalProducts:
          type: integer
          minimum: 0
          description: Total number of products across all shops
        lowStockCount:
          type: integer
          minimum: 0
          description: Number of products below reorder level
        todaysSales:
          type: number
          format: float
          description: Total sales today (sum of all orders)
        todaysOrderCount:
          type: integer
          minimum: 0
          description: Number of orders created today
        pendingOrdersCount:
          type: integer
          minimum: 0
          description: Orders in PENDING or PROCESSING status
        activeAlertsCount:
          type: integer
          minimum: 0
          description: Active low-stock and out-of-stock alerts
        totalShops:
          type: integer
          minimum: 1
        totalSuppliers:
          type: integer
          minimum: 0
        totalCustomers:
          type: integer
          minimum: 0
        recentOrders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
          description: Last 5 orders with full details
        timestamp:
          type: string
          format: date-time
      required:
        - totalProducts
        - lowStockCount
        - todaysSales
        - todaysOrderCount
        - pendingOrdersCount
        - activeAlertsCount

    RealtimeEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [stock_adjusted, stock_transferred, alert_created, order_created]
        data:
          type: object
          additionalProperties: true
          description: Event-specific data
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - timestamp

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check endpoint
      tags:
        - Health
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthToken'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: MFA required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  tempToken:
                    type: string
                    description: Temporary token for MFA verification

  /auth/register:
    post:
      summary: Register new user
      tags:
        - Authentication
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                  minLength: 2
                phone:
                  type: string
                role:
                  type: string
                  enum: [OWNER, ADMIN, STAFF]
              required:
                - email
                - password
                - name
                - phone
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Invalid input or user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Logout user
      tags:
        - Authentication
      operationId: logout
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized

  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required:
                - refreshToken
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/mfa/verify:
    post:
      summary: Verify MFA OTP
      tags:
        - Authentication
      operationId: verifyMFA
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tempToken:
                  type: string
                  description: Temporary token from login response
                otp:
                  type: string
                  pattern: '^\d{6}$'
              required:
                - tempToken
                - otp
      responses:
        '200':
          description: MFA verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthToken'
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products:
    get:
      summary: List all products with pagination
      tags:
        - Products
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or SKU
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer
        '401':
          description: Unauthorized

    post:
      summary: Create new product
      tags:
        - Products
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
                sku:
                  type: string
                  minLength: 1
                category:
                  type: string
                price:
                  type: number
                  format: float
                  minimum: 0
                costPrice:
                  type: number
                  format: float
                  minimum: 0
                reorderLevel:
                  type: integer
                  minimum: 0
                supplierId:
                  type: string
                  format: uuid
              required:
                - name
                - sku
                - category
                - price
                - costPrice
                - reorderLevel
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /products/{id}:
    get:
      summary: Get product by ID with stock info
      tags:
        - Products
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Product'
                      - type: object
                        properties:
                          stocks:
                            type: array
                            items:
                              $ref: '#/components/schemas/Stock'
                            description: Stock across all shops
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update product
      tags:
        - Products
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                  format: float
                  minimum: 0
                costPrice:
                  type: number
                  format: float
                  minimum: 0
                reorderLevel:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Product'
        '404':
          description: Product not found

    delete:
      summary: Delete product
      tags:
        - Products
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product deleted successfully
        '404':
          description: Product not found

  /inventory/stock/{productId}/{shopId}:
    get:
      summary: Get stock for product in specific shop
      tags:
        - Inventory
      operationId: getStock
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: shopId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stock information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Stock'
        '404':
          description: Stock not found

  /inventory/adjust:
    post:
      summary: Add or remove stock (stock adjustment)
      tags:
        - Inventory
      operationId: adjustStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
                shopId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  description: Positive to add, negative to remove
                reason:
                  type: string
                  enum: [RESTOCK, DAMAGE, LOSS, INVENTORY_COUNT, OTHER]
                notes:
                  type: string
              required:
                - productId
                - shopId
                - quantity
                - reason
      responses:
        '200':
          description: Stock adjusted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Stock'
        '400':
          description: Invalid input (e.g., insufficient stock)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /inventory/transfer:
    post:
      summary: Transfer stock between shops
      tags:
        - Inventory
      operationId: transferStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                  format: uuid
                fromShopId:
                  type: string
                  format: uuid
                toShopId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
                reason:
                  type: string
              required:
                - productId
                - fromShopId
                - toShopId
                - quantity
      responses:
        '200':
          description: Stock transferred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      fromStock:
                        $ref: '#/components/schemas/Stock'
                      toStock:
                        $ref: '#/components/schemas/Stock'
        '400':
          description: Invalid transfer (e.g., insufficient stock)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders:
    get:
      summary: Get orders with role-based filtering
      tags:
        - Orders
      operationId: listOrders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
