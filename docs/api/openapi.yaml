---

## Rate Limiting
- Unauthenticated endpoints: 60 requests/minute per IP
- Authenticated endpoints: 1000 requests/hour per user

## Pagination
All list endpoints support `page` and `limit` query parameters:
- Default page: 1
- Default limit: 20
- Maximum limit: 100

## Response Format
All successful responses follow this format:
```json
{
  "success": true,
  "data": {...}
}
```

All error responses follow this format:
```json
{
  "success": false,
  "message": "Error description",
  "errors": [{"field": "fieldName", "message": "Field error"}]
}
```

## Authentication
All endpoints (except /health, /auth/login, /auth/register, /auth/mfa/verify) require:
- Bearer token in Authorization header
- Token format: `Authorization: Bearer <JWT_TOKEN>`
- Token signed with RS256 asymmetric algorithm

## Error Codes
- 400: Bad Request - Invalid input parameters
- 401: Unauthorized - Missing or invalid token
- 403: Forbidden - Insufficient permissions
- 404: Not Found - Resource not found
- 409: Conflict - Resource already exists
- 422: Unprocessable Entity - Validation error
- 429: Too Many Requests - Rate limit exceeded
- 500: Internal Server Error

## Webhook Security
Payment webhooks include HMAC-SHA256 signature verification:
- Header: X-Razorpay-Signature
- Verification: HMAC(secret, "{order_id}|{payment_id}") === signature
